<svg width="900" height="400" viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .stroke {
      fill: none;
      stroke: #0A2A66;
      stroke-width: 14;
      stroke-linecap: square;
      stroke-linejoin: miter;
    }
    .text {
      fill: #3A3A3A;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 64px;
      letter-spacing: 6px;
      font-weight: 600;
    }
  </style>

  <!-- T angular izquierda -->
  <path class="stroke" d="
    M 40 40
    L 820 40
    M 40 40
    L 260 320
  " />

  <!-- Base -->
  <line class="stroke" x1="300" y1="340" x2="780" y2="340" />

  <!-- S angular dominante -->
  <path class="stroke" d="
    M 780 340
    L 860 300
    L 860 220
    L 780 180
    L 780 120
    L 880 40
  " />

  <!-- Texto -->
  <text class="text" x="300" y="220">TITAN IPS</text>
</svg>